name: baby_companion
description: "Standalone Flutter baby-tracking app — port of the Pebble Baby Companion watch app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  sqflite: ^2.3.3
  path: ^1.9.0
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^18.0.1
  android_alarm_manager_plus: ^4.0.7
  vibration: ^2.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
